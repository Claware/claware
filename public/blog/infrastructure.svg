<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="600" y2="340">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="50%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="600" height="340" fill="url(#bg3)"/>

  <!-- Server racks -->
  <g fill="#1F2937" stroke="#374151" stroke-width="2">
    <rect x="100" y="80" width="80" height="200" rx="4"/>
    <rect x="200" y="60" width="80" height="240" rx="4"/>
    <rect x="300" y="80" width="80" height="200" rx="4"/>
    <rect x="400" y="100" width="80" height="160" rx="4"/>
  </g>

  <!-- Server lights/LEDs -->
  <g>
    <!-- Rack 1 -->
    <circle cx="125" cy="110" r="4" fill="#10B981"/>
    <circle cx="140" cy="110" r="4" fill="#3B82F6"/>
    <circle cx="155" cy="110" r="4" fill="#10B981"/>

    <circle cx="125" cy="140" r="4" fill="#10B981"/>
    <circle cx="140" cy="140" r="4" fill="#10B981"/>
    <circle cx="155" cy="140" r="4" fill="#F59E0B"/>

    <circle cx="125" cy="170" r="4" fill="#10B981"/>
    <circle cx="140" cy="170" r="4" fill="#10B981"/>
    <circle cx="155" cy="170" r="4" fill="#10B981"/>

    <!-- Rack 2 -->
    <circle cx="225" cy="90" r="4" fill="#10B981"/>
    <circle cx="240" cy="90" r="4" fill="#10B981"/>
    <circle cx="255" cy="90" r="4" fill="#10B981"/>

    <circle cx="225" cy="120" r="4" fill="#3B82F6"/>
    <circle cx="240" cy="120" r="4" fill="#10B981"/>
    <circle cx="255" cy="120" r="4" fill="#10B981"/>

    <circle cx="225" cy="150" r="4" fill="#10B981"/>
    <circle cx="240" cy="150" r="4" fill="#F59E0B"/>
    <circle cx="255" cy="150" r="4" fill="#10B981"/>

    <!-- More lights for taller rack -->
    <circle cx="225" cy="180" r="4" fill="#10B981"/>
    <circle cx="240" cy="180" r="4" fill="#10B981"/>
    <circle cx="255" cy="180" r="4" fill="#10B981"/>

    <circle cx="225" cy="210" r="4" fill="#10B981"/>
    <circle cx="240" cy="210" r="4" fill="#10B981"/>
    <circle cx="255" cy="210" r="4" fill="#3B82F6"/>

    <circle cx="225" cy="240" r="4" fill="#10B981"/>
    <circle cx="240" cy="240" r="4" fill="#10B981"/>
    <circle cx="255" cy="240" r="4" fill="#10B981"/>

    <!-- Rack 3 -->
    <circle cx="325" cy="110" r="4" fill="#10B981"/>
    <circle cx="340" cy="110" r="4" fill="#10B981"/>
    <circle cx="355" cy="110" r="4" fill="#10B981"/>

    <circle cx="325" cy="140" r="4" fill="#10B981"/>
    <circle cx="340" cy="140" r="4" fill="#F59E0B"/>
    <circle cx="355" cy="140" r="4" fill="#10B981"/>

    <circle cx="325" cy="170" r="4" fill="#10B981"/>
    <circle cx="340" cy="170" r="4" fill="#10B981"/>
    <circle cx="355" cy="170" r="4" fill="#10B981"/>

    <!-- Rack 4 -->
    <circle cx="425" cy="130" r="4" fill="#3B82F6"/>
    <circle cx="440" cy="130" r="4" fill="#10B981"/>
    <circle cx="455" cy="130" r="4" fill="#10B981"/>

    <circle cx="425" cy="160" r="4" fill="#10B981"/>
    <circle cx="440" cy="160" r="4" fill="#10B981"/>
    <circle cx="455" cy="160" r="4" fill="#10B981"/>

    <circle cx="425" cy="190" r="4" fill="#10B981"/>
    <circle cx="440" cy="190" r="4" fill="#10B981"/>
    <circle cx="455" cy="190" r="4" fill="#F59E0B"/>
  </g>

  <!-- Connection lines (network) -->
  <g stroke="#6366F1" stroke-width="1.5" opacity="0.6" fill="none">
    <path d="M 140 280 L 140 300 L 240 300 L 240 300"/>
    <path d="M 240 300 L 340 300 L 340 280"/>
    <path d="M 340 300 L 440 300 L 440 260"/>
    <path d="M 140 300 L 140 320 L 300 320 L 440 320 L 440 300"/>
  </g>

  <!-- Glow effects -->
  <ellipse cx="240" cy="180" rx="100" ry="120" fill="url(#glow)" opacity="0.3"/>
</svg>
