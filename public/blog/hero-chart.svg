<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="url(#bg)"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="50%" stop-color="#F9FAFB"/>
      <stop offset="100%" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="800" y2="0">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="line2" x1="0" y1="0" x2="800" y2="0">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Grid lines -->
  <g stroke="#E5E7EB" stroke-width="1">
    <line x1="80" y1="100" x2="720" y2="100"/>
    <line x1="80" y1="180" x2="720" y2="180"/>
    <line x1="80" y1="260" x2="720" y2="260"/>
    <line x1="80" y1="340" x2="720" y2="340"/>
  </g>

  <!-- Area fills -->
  <path d="M 80 340 Q 200 320 320 280 T 480 220 T 640 140 T 720 80 L 720 420 L 80 420 Z" fill="url(#line1)" fill-opacity="0.15"/>
  <path d="M 80 360 Q 200 350 320 320 T 480 280 T 640 220 T 720 180 L 720 420 L 80 420 Z" fill="url(#line2)" fill-opacity="0.15"/>

  <!-- Main lines -->
  <path d="M 80 340 Q 200 320 320 280 T 480 220 T 640 140 T 720 80" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round"/>
  <path d="M 80 360 Q 200 350 320 320 T 480 280 T 640 220 T 720 180" fill="none" stroke="#D97706" stroke-width="3" stroke-linecap="round"/>

  <!-- Data point labels -->
  <text x="670" y="70" fill="#059669" font-size="18" font-weight="700" font-family="system-ui">20.8M</text>
  <text x="670" y="165" fill="#D97706" font-size="18" font-weight="700" font-family="system-ui">9.9M</text>

  <!-- Legend -->
  <g transform="translate(100, 60)">
    <circle cx="0" cy="0" r="5" fill="#059669"/>
    <text x="15" y="5" fill="#6B7280" font-size="12" font-weight="500" font-family="system-ui">TOTAL VIEWERSHIP</text>
    <circle cx="0" cy="25" r="5" fill="#D97706"/>
    <text x="15" y="30" fill="#6B7280" font-size="12" font-weight="500" font-family="system-ui">AI VIEWERSHIP</text>
  </g>

  <!-- X-axis labels -->
  <text x="80" y="445" fill="#9CA3AF" font-size="11" font-family="system-ui">DEC 2024</text>
  <text x="660" y="445" fill="#9CA3AF" font-size="11" font-family="system-ui">DEC 2025</text>
  <text x="370" y="445" fill="#9CA3AF" font-size="11" font-family="system-ui">JUN</text>

  <!-- Month labels -->
  <text x="200" y="445" fill="#D1D5DB" font-size="10" font-family="system-ui">FEB</text>
  <text x="280" y="445" fill="#D1D5DB" font-size="10" font-family="system-ui">APR</text>
  <text x="460" y="445" fill="#D1D5DB" font-size="10" font-family="system-ui">AUG</text>
  <text x="540" y="445" fill="#D1D5DB" font-size="10" font-family="system-ui">OCT</text>
</svg>
